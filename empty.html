<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quotes & Reflections</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      line-height: 1.8;
      scroll-behavior: smooth;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .content-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 30px;
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8em;
      margin-bottom: 20px;
      text-align: center;
      color: #e8c1a0;
      font-weight: 700;
      line-height: 1.3;
    }

    .subtitle {
      text-align: center;
      font-style: italic;
      color: rgba(232, 232, 232, 0.7);
      margin-bottom: 50px;
      font-size: 1.1em;
      font-weight: 300;
    }

    .quotes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .quote-box {
      background: rgba(232, 193, 160, 0.08);
      border: 2px solid rgba(232, 193, 160, 0.3);
      border-radius: 12px;
      padding: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .quote-box:hover {
      background: rgba(232, 193, 160, 0.15);
      border-color: rgba(232, 193, 160, 0.5);
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(232, 193, 160, 0.2);
    }

    .quote-box.active {
      background: rgba(232, 193, 160, 0.12);
      border-color: #e8c1a0;
    }

    .quote-text {
      font-size: 1.1em;
      font-style: italic;
      margin-bottom: 10px;
      line-height: 1.6;
      color: #e8e8e8;
      font-weight: 300;
    }

    .reflection {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.4s ease;
      margin-top: 20px;
      padding-top: 0;
      border-top: 2px solid rgba(232, 193, 160, 0);
    }

    .quote-box.active .reflection {
      max-height: 500px;
      opacity: 1;
      padding-top: 20px;
      border-top: 2px solid rgba(232, 193, 160, 0.5);
    }

    .reflection-title {
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 1em;
      color: #e8c1a0;
    }

    .reflection-text {
      font-style: normal;
      font-size: 0.95em;
      line-height: 1.7;
      color: #e8e8e8;
      font-weight: 300;
    }

    .return-button {
      padding: 14px 28px;
      background: rgba(232, 193, 160, 0.15);
      border: 2px solid #e8c1a0;
      border-radius: 25px;
      color: #e8c1a0;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
      margin-top: 40px;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      backdrop-filter: blur(10px);
    }

    .return-button:hover {
      background: #e8c1a0;
      color: #1a1a2e;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(232, 193, 160, 0.3);
    }

    .button-container {
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-style: italic;
      color: rgba(232, 232, 232, 0.7);
      font-weight: 300;
    }

    @media (max-width: 768px) {
      .content-wrapper {
        padding: 25px 20px;
      }

      .quotes-grid {
        grid-template-columns: 1fr;
      }
      
      h1 {
        font-size: 2em;
      }

      .subtitle {
        font-size: 1em;
      }
    }
  </style>
</head>

<body>
  
  <div class="content-wrapper">
    <header>
      <h1>Quotes & Reflections</h1>
      <p class="subtitle">
        Click on any quote to reveal your reflection
      </p>
    </header>

    <main>
      <div class="quotes-grid" id="quotes-container">
        <div class="loading">Loading quotes...</div>
      </div>

      <div class="button-container">
        <a href="index.html" class="return-button">
          Go Back to the Guide
        </a>
      </div>
    </main>
  </div>

  <script>
    // Load quotes from quotes.txt
    fetch('quotes.txt')
      .then(response => {
        if (!response.ok) throw new Error("File not found");
        return response.text();
      })
      .then(text => {
        const quotes = text.split('\n').filter(q => q.trim().length > 0);
        const container = document.getElementById('quotes-container');
        
        // Clear loading message
        container.innerHTML = '';
        
        // Create a quote box for each quote
        quotes.forEach((quote, index) => {
          const quoteBox = document.createElement('div');
          quoteBox.className = 'quote-box';
          quoteBox.onclick = function() { this.classList.toggle('active'); };
          
          quoteBox.innerHTML = `
            <div class="quote-text">
              "${quote}"
            </div>
            <div class="reflection">
              <div class="reflection-title">My Reflection:</div>
              <div class="reflection-text">
                Add your personal reflection for this quote here.
              </div>
            </div>
          `;
          
          container.appendChild(quoteBox);
        });
      })
      .catch(error => {
        console.error('Error loading quotes:', error);
        document.getElementById('quotes-container').innerHTML = 
          '<div class="loading">Error loading quotes. Please make sure quotes.txt is in the same directory.</div>';
      });
  </script>

</body>
</html>
